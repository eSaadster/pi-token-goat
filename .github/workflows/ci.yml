name: CI
on: [push, pull_request]

# Full test suite (Windows serial + WSL parallel, ~14 900 tests) runs
# pre-push via lefthook on the developer's machine before any push reaches
# GitHub. CI is a thin gate: lint and type-check only.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.13
      - run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check
      - name: Type check
        run: uv run mypy src
