pre-commit:
  commands:
    lint:
      run: uv run ruff check {staged_files}
      glob: "*.py"
    typecheck:
      run: uv run mypy src
      glob: "*.py"
    wal-guard:
      run: .venv/Scripts/python.exe -m pytest tests/test_wal_growth_guard.py -q --tb=short
      glob: "*.py"

pre-push:
  commands:
    all-checks:
      # Single bash wrapper runs typecheck + Windows tests + WSL tests in
      # parallel internally. Avoids lefthook's parallel-mode EvalSymlinks
      # canonicalize failure on Windows (affects commands with glob: on
      # parallel runners when stdin is read concurrently).
      run: bash .lefthook-scripts/run-all-checks.sh
